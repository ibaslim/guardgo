<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
  <div class="max-w-md w-full space-y-8">
    <div>
      <div class="flex justify-center mb-6">
        <div>
          <img src="assets/images/shared/guardgo-logo.svg" width="120" height="80" alt="logo" class="dark:hidden" />
          <img src="assets/images/shared/guardgo-logo-dark.svg" width="120" height="80" alt="logo" class="hidden dark:block" />
        </div>
      </div>
      <h2 class="mt-6 text-center text-4xl font-extrabold text-gray-900 dark:text-white">{{ title }}</h2>
      <p class="mt-3 text-center text-sm text-gray-600 dark:text-gray-400">{{ description }}</p>
    </div>

    <app-card [showHeader]="false" [containerClass]="'bg-white dark:bg-gray-800 shadow-xl rounded-lg p-8'" [bodyClass]="'space-y-6'">
      <div class="flex justify-center">
        <img src="/assets/images/shared/welcom_icon.svg" alt="status" class="w-16 h-16" />
      </div>
      <button
        (click)="goHome()"
        class="w-full inline-flex items-center justify-center py-3 px-4 rounded-md text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
      >
        {{ actionLabel }}
      </button>
    </app-card>
  </div>
</div>
