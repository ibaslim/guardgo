<app-page
  title="Dashboard Overview"
  [subtitle]="pageSubtitle"
  [contentClass]="'mx-auto max-w-6xl space-y-6'"
>
  <div *ngIf="loading" class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
    <div *ngFor="let _ of [1,2,3,4]" class="h-28 animate-pulse rounded-xl bg-gray-100 dark:bg-gray-800"></div>
  </div>

  <ng-container *ngIf="!loading">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
      <app-summary-metric-card
        *ngFor="let metric of metrics"
        [label]="metric.label"
        [value]="metric.value"
        [helperText]="metric.helperText || ''"
      ></app-summary-metric-card>
    </div>

    <div class="space-y-6">
      <app-section
        *ngFor="let section of sections"
        [title]="section.title"
        [subtitle]="section.subtitle"
      >
        <button
          section-actions
          *ngIf="section.actionLabel && section.actionRoute"
          type="button"
          (click)="goTo(section.actionRoute)"
          class="relative z-20 inline-flex items-center justify-center rounded-md bg-white px-3 py-1.5 text-xs font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 transition hover:bg-gray-50 dark:bg-gray-700 dark:text-white dark:ring-gray-500 dark:hover:bg-gray-600"
        >
          {{ section.actionLabel }}
        </button>

        <div *ngIf="!section.items.length" class="rounded-xl border border-dashed border-gray-200 px-5 py-10 text-center text-sm text-gray-500 dark:border-gray-700 dark:text-gray-400">
          {{ section.emptyMessage }}
        </div>

        <div *ngIf="section.items.length" class="space-y-3">
          <div
            *ngFor="let item of section.items"
            class="rounded-xl border border-gray-200 bg-white/70 px-5 py-4 shadow-sm dark:border-gray-700 dark:bg-gray-900/50"
            [class.cursor-pointer]="!!item.route"
            [class.relative]="!!item.route"
            [class.z-10]="!!item.route"
            role="button"
            [attr.tabindex]="item.route ? 0 : null"
            (click)="item.route && goTo(item.route)"
            (keydown.enter)="item.route && goTo(item.route)"
          >
            <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
              <div class="min-w-0 flex-1">
                <div class="text-base font-semibold text-gray-900 dark:text-gray-100">
                  {{ item.title }}
                </div>
                <div class="mt-1 text-sm text-gray-600 dark:text-gray-300">
                  {{ item.subtitle }}
                </div>
                <div class="mt-2 text-xs text-gray-400 dark:text-gray-500">
                  {{ item.meta }}
                </div>
              </div>
              <div class="flex shrink-0 justify-end">
                <button
                  *ngIf="item.route"
                  type="button"
                  (click)="goTo(item.route); $event.stopPropagation()"
                  class="relative z-20 inline-flex items-center justify-center rounded-md bg-white px-3 py-1.5 text-xs font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 transition hover:bg-gray-50 dark:bg-gray-700 dark:text-white dark:ring-gray-500 dark:hover:bg-gray-600"
                >
                  Open
                </button>
              </div>
            </div>
          </div>
        </div>
      </app-section>
    </div>
  </ng-container>
</app-page>
