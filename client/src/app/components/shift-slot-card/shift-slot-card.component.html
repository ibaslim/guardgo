<div [class]="containerClass">
  <label *ngIf="selectable; else staticCard" [class]="selectableWrapperClass">
    <input
      type="checkbox"
      [name]="selectionName"
      [checked]="selected"
      [class]="checkboxClass"
      (change)="onSelectedChange($any($event.target).checked)"
    />
    <div class="min-w-0 flex-1">
      <div class="flex flex-wrap items-center gap-2">
        <span
          *ngIf="statusLabel"
          class="inline-flex rounded-full px-2.5 py-1 text-[11px] font-semibold"
          [class]="statusClass"
        >
          {{ statusLabel }}
        </span>
        <span *ngIf="title" [class]="titleClass">{{ title }}</span>
        <span *ngFor="let badge of badges; trackBy: trackByBadge" [class]="badge.className">
          {{ badge.label }}
        </span>
      </div>

      <div *ngIf="visibleMetaItems.length" class="mt-2 flex flex-wrap items-center gap-3 text-sm text-gray-600 dark:text-gray-300">
        <ng-container *ngFor="let item of visibleMetaItems; let last = last; trackBy: trackByText">
          <span>{{ item }}</span>
          <span *ngIf="!last">•</span>
        </ng-container>
      </div>

      <div *ngIf="visibleDetailItems.length" class="mt-2 flex flex-wrap items-center gap-3 text-xs text-gray-500 dark:text-gray-400">
        <span *ngFor="let item of visibleDetailItems; trackBy: trackByText">{{ item }}</span>
      </div>

      <div class="mt-3 empty:mt-0">
        <ng-content></ng-content>
      </div>
    </div>
  </label>

  <ng-template #staticCard>
    <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
      <div class="min-w-0 flex-1">
        <div class="flex flex-wrap items-center gap-2">
          <span
            *ngIf="statusLabel"
            class="inline-flex rounded-full px-2.5 py-1 text-[11px] font-semibold"
            [class]="statusClass"
          >
            {{ statusLabel }}
          </span>
          <span *ngIf="title" [class]="titleClass">{{ title }}</span>
          <span *ngFor="let badge of badges; trackBy: trackByBadge" [class]="badge.className">
            {{ badge.label }}
          </span>
        </div>

        <div *ngIf="visibleMetaItems.length" class="mt-2 flex flex-wrap items-center gap-3 text-sm text-gray-600 dark:text-gray-300">
          <ng-container *ngFor="let item of visibleMetaItems; let last = last; trackBy: trackByText">
            <span>{{ item }}</span>
            <span *ngIf="!last">•</span>
          </ng-container>
        </div>

        <div *ngIf="visibleDetailItems.length" class="mt-2 flex flex-wrap items-center gap-3 text-xs text-gray-500 dark:text-gray-400">
          <span *ngFor="let item of visibleDetailItems; trackBy: trackByText">{{ item }}</span>
        </div>

        <div class="mt-3 empty:mt-0">
          <ng-content></ng-content>
        </div>
      </div>

      <div class="flex shrink-0 flex-wrap gap-2 empty:hidden">
        <ng-content select="[slot-card-actions]"></ng-content>
      </div>
    </div>
  </ng-template>
</div>
