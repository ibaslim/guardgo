<div *ngIf="show" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4 modal-overlay" (mousedown)="onOverlayClick($event)">
  <div class="relative w-full max-h-[calc(100vh-2rem)] overflow-y-auto rounded shadow-lg border border-gray-200 bg-white p-4 dark:border-gray-700 dark:bg-gray-800 sm:p-6"
    [ngClass]="dialogSizeClass" (mousedown)="$event.stopPropagation()">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-bold text-gray-900 dark:text-gray-100">{{ title }}</h2>
      <button (click)="close.emit()" class="text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-gray-100 text-2xl leading-none">&times;</button>
    </div>
    <div class="mb-4">
      <ng-content></ng-content>
    </div>
    <div class="flex justify-end gap-2">
      <ng-content select="[modal-actions]"></ng-content>
    </div>
  </div>
</div>
