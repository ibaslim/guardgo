<div
  class="pointer-events-none fixed inset-x-0 top-0 z-[70] transition-opacity duration-200"
  [class.opacity-0]="!loading.isVisible()"
  [class.opacity-100]="loading.isVisible()"
  aria-hidden="true"
>
  <div class="h-1 w-full overflow-hidden bg-blue-100/70 dark:bg-blue-950/40">
    <div class="global-loading-bar h-full w-1/3 bg-gradient-to-r from-cyan-400 via-blue-500 to-sky-400 shadow-[0_0_18px_rgba(59,130,246,0.45)]"></div>
  </div>
</div>

<style>
  .global-loading-bar {
    animation: global-loading-slide 1.2s ease-in-out infinite;
  }

  @keyframes global-loading-slide {
    0% {
      transform: translateX(-120%);
    }
    50% {
      transform: translateX(90%);
    }
    100% {
      transform: translateX(260%);
    }
  }
</style>
