<div class="relative notification-bell-container" (click)="$event.stopPropagation()">
  <button
    type="button"
    (click)="toggleMenu($event)"
    class="relative inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-gray-200 bg-white text-gray-600 shadow-sm transition hover:border-blue-200 hover:text-blue-600 hover:shadow-md dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:border-blue-500/40 dark:hover:text-blue-300"
    aria-label="Notifications"
  >
    <app-icon name="bell" [size]="20"></app-icon>
    <span
      *ngIf="notificationsService.unreadCount() > 0"
      class="absolute -right-1.5 -top-1.5 inline-flex h-5 min-w-5 items-center justify-center rounded-full border-2 border-white bg-red-500 px-1 text-center text-[10px] font-bold leading-none text-white shadow-sm dark:border-gray-800"
    >
      {{ notificationsService.unreadCount() > 99 ? '99+' : notificationsService.unreadCount() }}
    </span>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute right-0 z-50 mt-3 w-[24rem] overflow-hidden rounded-3xl border border-gray-200 bg-white shadow-2xl ring-1 ring-black/5 dark:border-gray-700 dark:bg-gray-900"
  >
    <div class="flex items-center justify-between border-b border-gray-100 px-5 py-4 dark:border-gray-800">
      <div>
        <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Notifications</h3>
        <p class="text-xs text-gray-500 dark:text-gray-400">Latest account and workflow updates</p>
      </div>
      <button
        *ngIf="notificationsService.unreadCount() > 0"
        type="button"
        (click)="markAllRead($event)"
        class="text-xs font-semibold text-blue-600 hover:text-blue-700 dark:text-blue-300 dark:hover:text-blue-200"
      >
        Mark all read
      </button>
    </div>

    <div class="max-h-[28rem] overflow-y-auto">
      <div *ngIf="notificationsService.latestLoading()" class="space-y-3 p-4">
        <div *ngFor="let _ of [1,2,3]" class="animate-pulse rounded-2xl border border-gray-100 p-4 dark:border-gray-800">
          <div class="mb-2 h-3 w-24 rounded bg-gray-200 dark:bg-gray-700"></div>
          <div class="mb-2 h-4 w-3/4 rounded bg-gray-200 dark:bg-gray-700"></div>
          <div class="h-3 w-full rounded bg-gray-100 dark:bg-gray-800"></div>
        </div>
      </div>

      <div *ngIf="!notificationsService.latestLoading() && !notificationsService.latestItems().length" class="px-6 py-10 text-center">
        <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400">
          <app-icon name="bell" [size]="20"></app-icon>
        </div>
        <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">No notifications yet</p>
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Updates will appear here when something important changes.</p>
      </div>

      <div *ngIf="!notificationsService.latestLoading() && notificationsService.latestItems().length" class="p-3">
        <button
          type="button"
          *ngFor="let item of notificationsService.latestItems(); trackBy: trackById"
          (click)="onOpenNotification(item, $event)"
          class="mb-2 block w-full rounded-2xl border px-4 py-3 text-left transition hover:border-blue-200 hover:bg-blue-50/70 dark:hover:border-blue-500/30 dark:hover:bg-blue-950/20"
          [class]="item.is_read
            ? 'border-gray-100 bg-white dark:border-gray-800 dark:bg-gray-900'
            : 'border-blue-100 bg-blue-50/70 dark:border-blue-900/40 dark:bg-blue-950/20'"
        >
          <div class="mb-2 flex items-start justify-between gap-3">
            <div class="flex items-center gap-2">
              <span class="inline-flex rounded-full px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.16em]" [class]="getCategoryClasses(item.category)">
                {{ item.category || 'info' }}
              </span>
              <span *ngIf="!item.is_read" class="inline-flex h-2.5 w-2.5 rounded-full bg-blue-500"></span>
            </div>
            <span class="shrink-0 text-[11px] text-gray-400 dark:text-gray-500">{{ formatRelativeDate(item.created_at) }}</span>
          </div>
          <div class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ item.title }}</div>
          <div class="mt-1 line-clamp-2 text-xs leading-5 text-gray-600 dark:text-gray-300">{{ item.message }}</div>
          <div *ngIf="item.action_label || item.action_url" class="mt-3 text-xs font-semibold text-blue-600 dark:text-blue-300">
            {{ item.action_label || 'Open' }}
          </div>
        </button>
      </div>
    </div>

    <div class="border-t border-gray-100 bg-gray-50 px-5 py-3 dark:border-gray-800 dark:bg-gray-950/50">
      <button
        type="button"
        (click)="viewAll($event)"
        class="flex w-full items-center justify-center gap-2 rounded-2xl bg-gray-900 px-4 py-3 text-sm font-semibold text-white transition hover:bg-black dark:bg-white dark:text-gray-900 dark:hover:bg-gray-100"
      >
        <span>View all notifications</span>
        <app-icon name="chevron-right" [size]="16"></app-icon>
      </button>
    </div>
  </div>
</div>
