<div *ngIf="mode === 'loading'; else emptyState" class="space-y-4 p-6">
  <div *ngFor="let _ of rows" class="animate-pulse rounded-lg border border-gray-100 p-5 dark:border-gray-800">
    <div class="mb-3 h-4 w-48 rounded bg-gray-200 dark:bg-gray-700"></div>
    <div class="mb-3 h-3 w-2/3 rounded bg-gray-100 dark:bg-gray-800"></div>
    <div class="h-3 w-1/2 rounded bg-gray-100 dark:bg-gray-800"></div>
  </div>
</div>

<ng-template #emptyState>
  <div class="px-6 py-16 text-center">
    <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-lg bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400">
      <app-icon [name]="icon" [size]="22"></app-icon>
    </div>
    <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">{{ title }}</h3>
    <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">{{ message }}</p>
  </div>
</ng-template>
