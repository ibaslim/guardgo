<div class="rounded-md border border-gray-100 p-4 dark:border-gray-800">
  <div class="flex items-center justify-between gap-3">
    <h4 class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ title }}</h4>
    <span class="text-xs text-gray-400 dark:text-gray-500">{{ countLabel }}</span>
  </div>

  <div *ngIf="loading" class="mt-4 space-y-2">
    <div *ngFor="let _ of skeletonRows" class="h-12 animate-pulse rounded-md bg-gray-100 dark:bg-gray-800"></div>
  </div>

  <div *ngIf="!loading && !visibleEvents.length" class="mt-3 text-sm text-gray-500 dark:text-gray-400">
    {{ emptyMessage }}
  </div>

  <div *ngIf="!loading && visibleEvents.length" class="mt-3 space-y-3">
    <div *ngFor="let event of visibleEvents; trackBy: trackByEventId" class="rounded-md border border-gray-100 px-4 py-3 dark:border-gray-700">
      <div class="flex flex-wrap items-center gap-2">
        <span class="inline-flex rounded-full bg-gray-100 px-2.5 py-1 text-[11px] font-medium text-gray-700 dark:bg-gray-800 dark:text-gray-200">
          {{ formatTokenLabel(event.event_type || 'event') }}
        </span>
        <span class="text-xs text-gray-400 dark:text-gray-500">{{ formatTimestamp(event.timestamp) }}</span>
      </div>

      <div
        *ngIf="showLocationDetails && (event.distance_meters != null || event.latitude != null || event.longitude != null)"
        class="mt-2 flex flex-wrap items-center gap-3 text-xs text-gray-500 dark:text-gray-400"
      >
        <span *ngIf="event.distance_meters != null">Distance {{ event.distance_meters }}m</span>
        <span *ngIf="event.latitude != null && event.longitude != null">Coords {{ event.latitude }}, {{ event.longitude }}</span>
      </div>

      <div *ngIf="event.note" class="mt-2 text-sm text-gray-600 dark:text-gray-300">{{ event.note }}</div>
    </div>
  </div>
</div>
