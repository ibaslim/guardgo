<ng-container [ngSwitch]="variant">
  <div *ngSwitchCase="'detail'" class="space-y-6 py-2">
    <div class="flex items-center gap-4">
      <app-placeload width="72px" height="72px" rounded="full"></app-placeload>
      <div class="flex-1 space-y-3">
        <app-placeload width="36%" height="1.25rem" rounded="lg"></app-placeload>
        <app-placeload width="22%" height="0.875rem"></app-placeload>
      </div>
    </div>
    <div class="rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-4">
      <app-placeload width="28%" height="1rem"></app-placeload>
      <app-placeload width="100%" height="0.875rem"></app-placeload>
      <app-placeload width="92%" height="0.875rem"></app-placeload>
      <app-placeload width="84%" height="0.875rem"></app-placeload>
    </div>
    <div class="rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-4">
      <app-placeload width="32%" height="1rem"></app-placeload>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
      </div>
    </div>
  </div>

  <div *ngSwitchCase="'list'" class="space-y-4">
    <div *ngFor="let _ of [1,2,3,4]" class="rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-3">
      <app-placeload width="24%" height="0.875rem"></app-placeload>
      <app-placeload width="48%" height="1.125rem" rounded="lg"></app-placeload>
      <app-placeload width="100%" height="0.875rem"></app-placeload>
      <app-placeload width="82%" height="0.875rem"></app-placeload>
    </div>
  </div>

  <div *ngSwitchDefault class="space-y-6 py-2">
    <div class="rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-4">
      <app-placeload width="20%" height="1rem"></app-placeload>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
        <app-placeload width="100%" height="2.75rem" rounded="lg"></app-placeload>
      </div>
    </div>
    <div class="rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-4">
      <app-placeload width="18%" height="1rem"></app-placeload>
      <app-placeload width="100%" height="7rem" rounded="lg"></app-placeload>
      <app-placeload width="72%" height="0.875rem"></app-placeload>
    </div>
  </div>
</ng-container>
