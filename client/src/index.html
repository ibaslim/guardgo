<!doctype html>
<html lang="en">

<head>
      <meta charset="utf-8">
      <meta content="IE=edge" http-equiv="X-UA-Compatible">
      <meta content="width=device-width, initial-scale=1" name="viewport">

      <title>GuardGo</title>
      <base href="/">

      <!-- Favicon -->
      <link rel="preload" as="image" href="/assets/images/shared/auth_dashboard_icon.svg" />
      <link href="/assets/images/shared/guardgo-favicon.svg" rel="icon" type="image/svg+xml">

      <!-- Open Graph / Facebook Metadata -->
      <meta content="website" property="og:type">
      <meta content="GuardGo | Security Operations Platform" property="og:title">
      <meta content="GuardGo is a security operations platform for guards, clients, and service providers to coordinate staffing, onboarding, and requests."
            property="og:description">
      <meta content="/assets/images/shared/og-image.png" property="og:image">

      <!-- Twitter Metadata -->
      <meta content="summary_large_image" property="twitter:card">
      <meta content="GuardGo | Security Operations Platform" property="twitter:title">
      <meta content="GuardGo is a security operations platform for guards, clients, and service providers to coordinate staffing, onboarding, and requests."
            property="twitter:description">
      <meta content="/assets/images/shared/twitter-card.png" property="twitter:image">

      <!-- SEO Keywords -->
      <meta content="GuardGo, Security Guards, Security Operations, Staffing, Client Requests, Service Providers"
            name="keywords">
      <meta content="GuardGo helps security teams manage guard onboarding, staffing requests, tenant operations, and service provider workflows."
            name="description">
      <meta content="GuardGo" name="author">

      <!-- Initialize dark mode before Angular boots to prevent flash -->
      <script>
            (function() {
                  const theme = localStorage.getItem('theme');
                  if (theme === 'dark') {
                        document.documentElement.classList.add('dark');
                  }
            })();
      </script>

</head>

<body>
      <noscript>
            <div class="blocked-media">
                  This site may not function properly because <b>JavaScript</b> appears to be disabled or blocked.
            </div>
      </noscript>
      <app-root></app-root>
</body>

</html>
