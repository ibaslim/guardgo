services:
  web:
    image: ${APP_IMAGE:?Set APP_IMAGE}:${IMAGE_TAG:-latest}
    env_file:
      - ${ENV_FILE:?Set ENV_FILE to the staging env file}
    environment:
      BLOOM_DIR: /app
    working_dir: /app
    depends_on:
      mongo:
        condition: service_healthy
      redis_server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_static_resource:/app/static/resource
    expose:
      - "8070"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Host: $${PRODUCTION_DOMAIN:-localhost}\" http://localhost:8070/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: >
      sh -c "exec gunicorn -w ${GUNICORN_WORKERS:-1} --threads ${GUNICORN_THREADS:-2} -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:8070 --timeout ${GUNICORN_TIMEOUT:-180}"

  worker:
    image: ${APP_IMAGE:?Set APP_IMAGE}:${IMAGE_TAG:-latest}
    env_file:
      - ${ENV_FILE:?Set ENV_FILE to the staging env file}
    environment:
      BLOOM_DIR: /app
    working_dir: /app
    depends_on:
      web:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_static_resource:/app/static/resource
    networks:
      - backend
    command: >
      sh -c "exec python3 /app/cronjobs.py"

  nginx:
    image: fholzer/nginx-brotli:latest
    ports:
      - "80:8080"
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./nginx/nginx-app.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --header=\"Host: $${PRODUCTION_DOMAIN:-localhost}\" -q -O - http://localhost:8080/health/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - ENABLE_BROTLI=1

  redis_server:
    image: redis:7.4.0
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: always
    env_file:
      - ${ENV_FILE:?Set ENV_FILE to the staging env file}
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  mongo:
    image: mongo:7
    restart: always
    env_file:
      - ${ENV_FILE:?Set ENV_FILE to the staging env file}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:27020:27017"
    volumes:
      - mongo:/data/db
    command: >
      bash -c "
      mongod --bind_ip_all --fork --logpath /var/log/mongodb.log &&
      sleep 10 &&
      mongosh --eval '
        db = db.getSiblingDB(\"admin\");
        if (db.getUser(\"${MONGO_ROOT_USERNAME}\") === null) {
          db.createUser({
            user: \"${MONGO_ROOT_USERNAME}\",
            pwd: \"${MONGO_ROOT_PASSWORD}\",
            roles: [{ role: \"userAdminAnyDatabase\", db: \"admin\" }, { role: \"readWriteAnyDatabase\", db: \"admin\" }]
          });
        }
      ' &&
      mongod --shutdown &&
      sleep 5 &&
      mongod --auth --bind_ip_all --fork --logpath /var/log/mongodb.log &&
      tail -f /var/log/mongodb.log
      "
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/27017' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  backend:
    driver: bridge

volumes:
  redis:
  mongo:
  app_static_resource:
