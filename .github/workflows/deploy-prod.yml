name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/guardgo-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerFiles/api_docker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-cache,mode=max

      - name: Validate SSH secrets
        shell: bash
        env:
          PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
          PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          PROD_VPS_SSH_PASSPHRASE: ${{ secrets.PROD_VPS_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [[ -z "${PROD_VPS_HOST:-}" ]]; then
            echo "::error::Missing secret PROD_VPS_HOST"
            exit 1
          fi

          if [[ -z "${PROD_VPS_USER:-}" ]]; then
            echo "::error::Missing secret PROD_VPS_USER"
            exit 1
          fi

          if [[ -z "${PROD_VPS_SSH_KEY:-}" ]]; then
            echo "::error::Missing secret PROD_VPS_SSH_KEY"
            exit 1
          fi

          tmp_key="$(mktemp)"
          trap 'rm -f "$tmp_key"' EXIT
          printf '%s\n' "$PROD_VPS_SSH_KEY" > "$tmp_key"
          chmod 600 "$tmp_key"

          if ssh-keygen -y -f "$tmp_key" >/dev/null 2>&1; then
            echo "SSH key format validated (unencrypted key)."
            exit 0
          fi

          if [[ -z "${PROD_VPS_SSH_PASSPHRASE:-}" ]]; then
            echo "::error::PROD_VPS_SSH_KEY appears passphrase-protected. Add PROD_VPS_SSH_PASSPHRASE or use a dedicated unencrypted CI deploy key."
            exit 1
          fi

          if ssh-keygen -y -P "$PROD_VPS_SSH_PASSPHRASE" -f "$tmp_key" >/dev/null 2>&1; then
            echo "SSH key and passphrase validated."
          else
            echo "::error::PROD_VPS_SSH_PASSPHRASE does not match PROD_VPS_SSH_KEY."
            exit 1
          fi

      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          passphrase: ${{ secrets.PROD_VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/guardgo
            git fetch --prune origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:prod
            APP_IMAGE=ghcr.io/${{ env.IMAGE_NAME }} IMAGE_TAG=prod ./scripts/deploy.sh prod down

            if ss -lntp | grep -Eq ':80 |:443 '; then
              echo "Ports 80/443 are still in use on VPS by another process."
              ss -lntp | grep -E ':80 |:443 ' || true
              exit 1
            fi

            APP_IMAGE=ghcr.io/${{ env.IMAGE_NAME }} IMAGE_TAG=prod ./scripts/deploy.sh prod up

            check_https() {
              local host="$1"
              local path="$2"
              local url="https://${host}${path}"

              for attempt in $(seq 1 20); do
                if curl -fsS --connect-timeout 5 --max-time 15 \
                  --resolve "${host}:443:127.0.0.1" \
                  "$url" >/dev/null; then
                  echo "Smoke check passed: $url"
                  return 0
                fi
                echo "Waiting for $url (attempt ${attempt}/20)..."
                sleep 3
              done

              echo "Smoke check failed: $url"
              docker ps || true
              docker logs --tail 200 guardgo-prod-nginx-1 || true
              docker logs --tail 200 guardgo-prod-web-1 || true
              return 1
            }

            check_https guardgo.org /health/live
            check_https guardgo.org /health/ready
            check_https www.guardgo.org /health/live
            check_https www.guardgo.org /health/ready

            docker image prune -f
