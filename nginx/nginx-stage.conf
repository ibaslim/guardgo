worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    open_file_cache off;

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $scheme;
        https https;
        http http;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name ggstage.vaultcentric.com;

        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ggstage.vaultcentric.com;

        ssl_certificate /etc/letsencrypt/live/ggstage.vaultcentric.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ggstage.vaultcentric.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 16m;

        location / {
            proxy_pass http://web:8070;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_http_version 1.1;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }
    }
}
